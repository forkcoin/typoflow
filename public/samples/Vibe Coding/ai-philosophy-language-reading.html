<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI时代的哲学：语言为什么不是透明工具</title>
  <style>
    :root {
      --hue-ink: 224;
      --hue-paper: 42;
      --hue-glass: 184;
      --hue-rose: 342;
      --hue-violet: 266;
      --hue-amber: 36;
      --color-bg: hsl(var(--hue-ink), 34%, 8%);
      --color-bg-soft: hsl(var(--hue-ink), 24%, 15%);
      --color-page: hsl(var(--hue-paper), 66%, 96%);
      --color-page-soft: hsl(var(--hue-paper), 44%, 91%);
      --color-ink: hsl(var(--hue-ink), 28%, 14%);
      --color-copy: hsl(var(--hue-ink), 16%, 29%);
      --color-muted: hsl(var(--hue-ink), 9%, 48%);
      --color-line: hsl(var(--hue-ink), 15%, 74%);
      --color-line-soft: hsl(var(--hue-ink), 16%, 84%, 0.66);
      --color-glass: hsl(var(--hue-glass), 56%, 48%);
      --color-glass-soft: hsl(var(--hue-glass), 68%, 88%);
      --color-rose: hsl(var(--hue-rose), 58%, 62%);
      --color-rose-soft: hsl(var(--hue-rose), 70%, 91%);
      --color-violet: hsl(var(--hue-violet), 48%, 60%);
      --color-violet-soft: hsl(var(--hue-violet), 62%, 92%);
      --color-amber: hsl(var(--hue-amber), 72%, 55%);
      --color-amber-soft: hsl(var(--hue-amber), 78%, 88%);
      --color-panel: hsl(var(--hue-paper), 82%, 99%, 0.78);
      --color-shine: hsl(var(--hue-paper), 90%, 99%, 0.58);
      --color-shadow: hsl(var(--hue-ink), 40%, 3%, 0.42);
      --font-display: "Didot", "Bodoni 72", "Songti SC", "STSong", serif;
      --font-body: "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --font-serif: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      --font-label: "Avenir Next", "Gill Sans", "PingFang SC", sans-serif;
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.266rem;
      --text-xl: 1.602rem;
      --text-2xl: 2.027rem;
      --text-3xl: 2.566rem;
      --text-4xl: 3.247rem;
      --leading-tight: 1.04;
      --leading-title: 1.22;
      --leading-copy: 1.78;
      --leading-note: 1.58;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-7: 1.75rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-14: 3.5rem;
      --space-16: 4rem;
      --radius-sm: 0.5rem;
      --radius-md: 1rem;
      --radius-lg: 1.75rem;
      --phone: 24.375rem;
      --duration: 760ms;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        radial-gradient(circle at 14% 10%, hsl(var(--hue-violet), 42%, 36%, 0.3), transparent 18rem),
        radial-gradient(circle at 88% 86%, hsl(var(--hue-glass), 48%, 30%, 0.28), transparent 20rem),
        linear-gradient(145deg, var(--color-bg), var(--color-bg-soft));
      color: var(--color-page);
      font-family: var(--font-body);
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0 48%, hsl(var(--hue-paper), 50%, 90%, 0.06) 48% 48.18%, transparent 48.18%),
        repeating-linear-gradient(90deg, transparent 0, transparent 4.45rem, hsl(var(--hue-paper), 40%, 90%, 0.035) 4.5rem);
    }

    main {
      width: min(100%, var(--phone));
      margin: 0 auto;
    }

    .progress {
      position: fixed;
      inset: 0 0 auto;
      z-index: 80;
      height: 0.1875rem;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, var(--color-glass), var(--color-rose), var(--color-amber), var(--color-violet));
    }

    .page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: var(--space-5) var(--space-4);
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .sheet {
      --accent: var(--color-glass);
      --accent-soft: var(--color-glass-soft);
      --wash: var(--color-rose-soft);
      position: relative;
      width: 100%;
      min-height: min(calc(100svh - var(--space-10)), 44.5rem);
      overflow: hidden;
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at var(--glow-x) var(--glow-y), var(--wash), transparent 13rem),
        linear-gradient(150deg, var(--color-page), var(--color-page-soft));
      box-shadow: 0 var(--space-6) var(--space-16) var(--color-shadow);
      color: var(--color-ink);
      animation: sheetIn var(--duration) var(--ease) both;
      isolation: isolate;
    }

    .sheet::before {
      position: absolute;
      inset: var(--space-3);
      z-index: 0;
      content: "";
      pointer-events: none;
      border: 0.0625rem solid var(--color-shine);
      border-radius: var(--radius-md);
      background:
        repeating-linear-gradient(0deg, transparent 0, transparent 3.65rem, var(--color-line-soft) 3.7rem),
        linear-gradient(90deg, transparent 0 17%, var(--color-line-soft) 17% 17.25%, transparent 17.25%);
      mask-image: linear-gradient(180deg, transparent, black 10%, black 90%, transparent);
    }

    .sheet::after {
      position: absolute;
      inset: 0;
      z-index: 0;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(112deg, transparent 0 50%, var(--accent-soft) 50% 58%, transparent 58%),
        radial-gradient(ellipse at 10% 88%, var(--accent-soft), transparent 12rem);
      mix-blend-mode: multiply;
      opacity: 0.78;
    }

    .tone-glass { --accent: var(--color-glass); --accent-soft: var(--color-glass-soft); --wash: var(--color-rose-soft); --glow-x: 82%; --glow-y: 18%; }
    .tone-rose { --accent: var(--color-rose); --accent-soft: var(--color-rose-soft); --wash: var(--color-glass-soft); --glow-x: 18%; --glow-y: 78%; }
    .tone-violet { --accent: var(--color-violet); --accent-soft: var(--color-violet-soft); --wash: var(--color-amber-soft); --glow-x: 82%; --glow-y: 72%; }
    .tone-amber { --accent: var(--color-amber); --accent-soft: var(--color-amber-soft); --wash: var(--color-violet-soft); --glow-x: 18%; --glow-y: 20%; }

    .meta,
    .foot,
    .content,
    .lens,
    .mesh,
    .facet,
    .mark,
    .side {
      position: absolute;
      z-index: 2;
    }

    .meta {
      top: var(--space-6);
      left: var(--space-6);
      right: var(--space-6);
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      color: var(--color-muted);
      font-family: var(--font-label);
      font-size: var(--text-xs);
    }

    .foot {
      left: var(--space-6);
      right: var(--space-6);
      bottom: var(--space-6);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: var(--space-3);
      color: var(--color-muted);
      font-family: var(--font-label);
      font-size: var(--text-xs);
    }

    .foot::before {
      height: 0.0625rem;
      content: "";
      background: var(--color-line);
      grid-column: 2;
    }

    .content {
      left: var(--space-7);
      right: var(--space-7);
      display: grid;
      gap: var(--space-5);
    }

    .content.top { top: 14%; }
    .content.mid { top: 27%; }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1,
    h2,
    .claim {
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: 0;
    }

    h1 {
      max-width: 5.9em;
      color: var(--color-ink);
      font-size: var(--text-4xl);
      line-height: var(--leading-tight);
    }

    h2 {
      max-width: 8.4em;
      color: var(--color-ink);
      font-size: var(--text-2xl);
      line-height: var(--leading-title);
    }

    .label {
      width: fit-content;
      padding: var(--space-1) var(--space-3);
      border: 0.0625rem solid var(--color-line);
      border-radius: 999rem;
      background: var(--color-panel);
      color: var(--accent);
      font-family: var(--font-label);
      font-size: var(--text-xs);
    }

    .copy {
      display: grid;
      gap: var(--space-4);
      max-width: 16.2em;
      color: var(--color-copy);
      font-size: var(--text-base);
      line-height: var(--leading-copy);
      text-align: justify;
      text-justify: inter-ideograph;
    }

    .copy::before {
      width: var(--space-10);
      height: 0.125rem;
      content: "";
      background: var(--accent);
    }

    .copy strong {
      color: var(--color-ink);
      font-weight: 700;
      background: linear-gradient(transparent 58%, var(--accent-soft) 58%);
    }

    .claim {
      max-width: 7.4em;
      color: var(--color-ink);
      font-size: var(--text-3xl);
      line-height: var(--leading-title);
    }

    .note {
      max-width: 17em;
      padding: var(--space-4);
      border-left: 0.1875rem solid var(--accent);
      background: var(--color-panel);
      color: var(--color-muted);
      font-size: var(--text-sm);
      line-height: var(--leading-note);
    }

    .points {
      display: grid;
      gap: var(--space-3);
      max-width: 17em;
    }

    .point {
      display: grid;
      grid-template-columns: var(--space-8) 1fr;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--color-panel);
      color: var(--color-copy);
      font-size: var(--text-base);
      line-height: var(--leading-note);
    }

    .point b {
      display: grid;
      place-items: center;
      width: var(--space-8);
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: var(--color-page);
      font-family: var(--font-label);
      font-size: var(--text-xs);
      font-weight: 700;
    }

    .lens {
      pointer-events: none;
      top: 12%;
      right: calc(var(--space-10) * -1);
      width: 13rem;
      aspect-ratio: 1;
      border: 0.0625rem solid var(--color-line);
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-soft), transparent 58%);
      opacity: 0.72;
    }

    .lens::before {
      position: absolute;
      inset: var(--space-7);
      content: "";
      border: 0.0625rem solid var(--accent);
      border-radius: 50%;
    }

    .mesh {
      pointer-events: none;
      left: calc(var(--space-16) * -1);
      bottom: var(--space-9);
      width: 18rem;
      height: 13rem;
      border: 0.0625rem solid var(--accent);
      border-radius: 50%;
      transform: rotate(-16deg);
      opacity: 0.42;
    }

    .facet {
      pointer-events: none;
      left: 48%;
      top: 18%;
      width: 7rem;
      height: 10rem;
      background: linear-gradient(135deg, var(--color-shine), transparent);
      clip-path: polygon(32% 0, 100% 20%, 72% 100%, 0 74%);
      opacity: 0.62;
    }

    .mark {
      pointer-events: none;
      right: var(--space-9);
      bottom: 31%;
      width: var(--space-9);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 var(--space-3) var(--accent-soft);
    }

    .side {
      right: var(--space-5);
      top: 42%;
      color: var(--color-muted);
      font-family: var(--font-display);
      font-size: var(--text-sm);
      line-height: 1.68;
      writing-mode: vertical-rl;
      opacity: 0.62;
    }

    @keyframes sheetIn {
      from { opacity: 0; transform: translateY(var(--space-5)) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (min-width: 48rem) {
      main { width: min(100%, 44rem); }
      .page { padding: var(--space-8); }
      .sheet { min-height: 42rem; }
      h1 { font-size: 3.815rem; }
      h2, .claim { font-size: 2.566rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="progress" aria-hidden="true"></div>
  <main id="deck"></main>

  <script>
    const pages = [
      { type: 'cover', tone: 'glass', label: 'AI时代的哲学', title: '语言为什么不是透明工具', note: '卷一：语言。第一章把语言从“工具”重新放回思想发生的现场。' },
      { type: 'question', tone: 'rose', label: '本章追问', title: '当你说“我想得很清楚，就是说不出来”时，你在抱怨什么？', copy: ['这句话背后藏着一个坚固预设：思想是一块完整的石头，语言只是用来装它的盒子。', '但如果语言从一开始就在切割、组织、甚至限定我们能想到什么，那会发生什么？'] },
      { type: 'claim', tone: 'violet', label: '核心假设', claim: '语言不是运送思想的管道，而是思想成型的现场。', note: '这篇文章的阅读路线，不是从“怎么表达”开始，而是从“语言如何塑造理解”开始。' },
      { type: 'text', tone: 'amber', label: '1.1 日常幻觉', title: '语言看起来像透明工具，是因为它太常成功了', copy: ['你去餐馆点菜，说：“一份青椒肉丝，不要放葱。”服务员记下，厨房炒菜，最后端上来一盘没有葱的青椒肉丝。', '在这种高度程式化的互动里，语言确实像透明管道，把要求稳稳当当地送到对方那里。'] },
      { type: 'text', tone: 'glass', label: '幻觉生成', title: '无数次成功交易，塑造了我们对语言的基础错觉', copy: ['我们开始相信：语言和锤子、扳手没有本质区别。锤子用来敲钉子，语言用来把意思说出去。', '于是表达失败被归结为工具不好：词汇量不够，表达能力不行，逻辑不够清楚。'] },
      { type: 'text', tone: 'rose', label: '思想外衣', title: '我们还以为，思想先完整存在，语言只是外衣', copy: ['一个人似乎先在脑海里形成完整的、非语言的想法，然后再去词典里寻找合适的词。', '脱掉语言这层外衣，里面那个赤裸裸的想法好像依然存在。'] },
      { type: 'question', tone: 'violet', label: '先别急着回答', title: '为什么换一种说法，事情本身好像就变了？', copy: ['试想你安慰朋友，或者在冲突中为自己辩护。你在“我很生气”和“我很失望”之间选一个词。', '选了哪个词，接下来的情绪和态度，往往真的会顺着那个词走下去。'] },
      { type: 'text', tone: 'amber', label: '1.2 幻觉为何成立', title: '把语言当透明工具，是一种高效的生存策略', copy: ['如果每次开口都要审视语言本身，交流会立刻瘫痪。就像骑车时一直盯着脚踏板，就没法看路。', '语言的透明性，恰恰是它被熟练掌握的标志。媒介越熟练，越会在感知中隐退。'] },
      { type: 'text', tone: 'glass', label: '狭窄场景', title: '确定性信息里，语言的工具属性被最大化', copy: ['填报表上的数字，或在地图上指明方向时，语言的颗粒度被压缩到最小。', '问题在于，我们把这种狭窄场景里的透明性，误当成了语言的全部本质。'] },
      { type: 'claim', tone: 'rose', label: '错觉最坚固处', claim: '我们误以为，所有沟通障碍都只是技术问题。', note: '只要词更准、表达更熟练、逻辑更直，似乎一切都能毫无损耗地传递。' },
      { type: 'text', tone: 'violet', label: '1.3 并不透明', title: '离开点菜和报数，透明通道立刻布满裂痕', copy: ['当你说“他背叛了我”，你不是像照相机一样记录事件。', '你是在用“背叛”这个词，把混乱的动作、沉默、缺席和言语，组织进一个道德评判框架。'] },
      { type: 'text', tone: 'amber', label: '词的重量', title: '“背叛”不是透明的，它自带重量', copy: ['它预设了信任的存在，预设了契约被撕毁，预设了受害者的位置。', '选定这个词的瞬间，不符合框架的细节就被语言的网眼过滤掉了。'] },
      { type: 'claim', tone: 'glass', label: '关键转折', claim: '语言不是在运送你对冲突的理解，语言就是在组织你的理解。', note: '你不是先有完整的“背叛感”，再贴标签；你是通过掌握这个词的用法，才学会识别这种痛苦。' },
      { type: 'text', tone: 'rose', label: '红色眼镜', title: '语言是我们无法摘下的眼镜', copy: ['戴着红色眼镜看世界时，不能说眼镜只是透明工具。是眼镜让世界呈现出红色。', '语言就是这副眼镜，而且是我们无法完全摘下的眼镜。'] },
      { type: 'concept', tone: 'violet', label: '概念开刀', title: '透明性：语言太擅长隐藏自己', points: ['语言的透明，不是说它简单，而是说它让你忘记自己正在透过语言看。', '打破透明幻觉，就是重新看到玻璃上的反光、网眼的大小、切割的痕迹。'] },
      { type: 'concept', tone: 'amber', label: '概念开刀', title: '媒介：不是管道，而是会改变承载物的东西', points: ['管道只负责运输，不改变流经它的水。', '真正的媒介会赋形。语言不是运输思想，而是在让思想凝固成型。'] },
      { type: 'text', tone: 'glass', label: '1.4 三者张力', title: '世界、思想、语言，不是一条单向传递链', copy: ['我们常以为：世界先在那里，思想随后产生，语言最后负责把思想说出来。', '但思想并不是先于语言存在的独立实体。复杂推理要成为可审视的思想，必须调用语言。'] },
      { type: 'text', tone: 'rose', label: '语言切分世界', title: '世界是连续的，概念像刀刃一样切开它', copy: ['世界并不会直接投射到我们脑海中。它是连续的、混沌的。', '语言用概念把世界切分成“树木”“河流”“正义”和“债务”。我们把握世界的方式，被语言颗粒度限制着。'] },
      { type: 'claim', tone: 'violet', label: '巨大张力', claim: '语言既是理解世界的凭靠，也是横亘其间的折射镜。', note: '我们必须用语言触碰世界和表达思想，但语言本身是一张有特定网眼和弹性的网。' },
      { type: 'text', tone: 'amber', label: '1.5 语言转向', title: '哲学为什么最终总会回到语言', copy: ['哲学家曾争论真理、善、存在，以为自己在直接研究世界本身。', '后来他们意识到：我们用来讨论这些事物的语言，本身可靠吗？'] },
      { type: 'text', tone: 'glass', label: '语法幻影', title: '很多深刻难题，可能是语言用法制造的错觉', copy: ['当我们追问“什么是真理”时，会不会被“真理”这个名词的语法误导，以为它像苹果一样对应某个东西？', '如果不检查鼻梁上的眼镜，我们对世界的判断可能只是语法制造的幻影。'] },
      { type: 'text', tone: 'rose', label: '1.6 AI重新点亮', title: 'AI 把语言问题重新推到前景', copy: ['大语言模型没有人类的身体，也没有在物理世界中生存过的经验。它拥有的是海量语言数据。', '它通过词语接续概率和参数网络处理语言形式，却展现出惊人的智能：写诗、编程、辩论、道歉。'] },
      { type: 'question', tone: 'violet', label: 'AI 的逼问', title: '如果语言只是管道，那么管道另一头一定有灵魂吗？', copy: ['面对连贯、复杂、充满逻辑的句子，我们很容易以为背后必有一个思想者。', '大模型像一面镜子，照出了我们对语言的深刻误解。'] },
      { type: 'claim', tone: 'amber', label: '机器的启示', claim: '不需要前置的思想者，语言规则的自动展开，也能生成看似智慧的文本。', note: 'AI 让我们不能再把语言当成透明空气。语言的物质性、结构性被推到了眼前。' },
      { type: 'summary', tone: 'glass', label: '这一章改变了什么', title: '语言不是透明盒子，而是组织、切割、限定理解的结构', points: ['表达困难不只是词汇量不足或逻辑不清。', '语言不是运送意思，而是在赋形。', '不审视语言，就会把塑造力量交给习惯和语法。'] },
      { type: 'task', tone: 'rose', label: '独立检验', title: '找一个真实语言场景，观察语言如何组织你的理解', points: ['选定一次解释复杂情况的经历。', '写下其中 2-3 个核心词汇。', '尝试替换这些词，观察情绪和判断是否随之变形。'] },
      { type: 'text', tone: 'violet', label: '1.7 遮蔽与展现', title: '一个词照亮一面，也把其他侧面推入黑暗', copy: ['当你把项目失败描述为“执行力不足”时，你照亮了行动迟缓和态度懈怠。', '同时，你遮蔽了资源分配、目标设定和市场变化。'] },
      { type: 'claim', tone: 'amber', label: '切割力量', claim: '语言不是表达全部思想，反而可能限制思想展开。', note: '如果你只能用“执行力”思考失败，就很难想出系统性的解决方案。' },
      { type: 'text', tone: 'glass', label: '1.8 词汇匮乏', title: '“词汇量太少”常常只是透明幻觉的变种', copy: ['它依然预设思想已经完整存在，只是缺少合适包装盒。', '但当你说不出来时，往往不是缺少一个高级词，而是现有语言结构无法捕捉复杂经验。'] },
      { type: 'text', tone: 'rose', label: '雕刻思想', title: '你不是在找盒子，而是在用语言雕刻思想', copy: ['面对混合情绪，可能根本不存在一个词能精确对应。', '真正的办法是拆解经验本身，用句子、比喻和故事重新组织感受。思想是在言说中逐渐清晰的。'] },
      { type: 'text', tone: 'violet', label: '1.9 从工具到现场', title: '把语言还原为现场，才能理解 AI 文本的异样力量', copy: ['当大模型写出感人悼词时，如果语言只是表达情感的工具，我们会问：它表达了谁的情感？', '但如果语言本身具有组织能力，我们就能理解：大模型是在操作悲伤的语言结构。'] },
      { type: 'text', tone: 'amber', label: '异类的位置', title: '大模型掌握了语言世界，却没有人类生活形式', copy: ['它能搭建悲伤的现场，即使自己并不在场。', '它掌握了人类最复杂的结构之一，却没有人类的身体、经验和生活处境。'] },
      { type: 'claim', tone: 'glass', label: '最终落点', claim: '理解 AI 时代，必须先打破语言的透明幻觉。', note: '语言正是人类与 AI 之间最深邃、最危险、也最迷人的交汇点。' },
      { type: 'summary', tone: 'rose', label: '复习', title: '这一章的阅读路线', points: ['日常成功交流制造了“语言是工具”的幻觉。', '复杂经验中，语言会切割、组织、遮蔽并展现世界。', 'AI 让语言结构的独立力量变得无法回避。'] },
      { type: 'cover', tone: 'violet', label: '卷一 语言', title: '下一章之前，请先保留一丝怀疑', note: '当你下次觉得“我只是把意思说出来”时，问一句：这个意思，是不是正在被语言塑形？' }
    ];

    const deck = document.querySelector('#deck');
    const total = pages.length;

    const createText = (tag, className, text) => {
      const el = document.createElement(tag);
      if (className) el.className = className;
      el.textContent = text;
      return el;
    };

    pages.forEach((item, index) => {
      const section = document.createElement('section');
      section.className = 'page';
      section.setAttribute('aria-label', item.label || `第 ${index + 1} 页`);

      const article = document.createElement('article');
      article.className = `sheet tone-${item.tone}`;

      article.append(createText('span', 'lens', ''));
      if (index % 3 === 0) article.append(createText('span', 'mesh', ''));
      if (index % 4 === 1) article.append(createText('span', 'facet', ''));
      if (index % 5 === 2) article.append(createText('span', 'mark', ''));
      if (item.type === 'question' || item.type === 'concept') article.append(createText('span', 'side', item.type === 'question' ? '问题先浮现' : '概念被切开'));

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.append(createText('span', '', item.label));
      meta.append(createText('span', '', `${String(index + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`));
      article.append(meta);

      const content = document.createElement('div');
      content.className = item.type === 'cover' || item.type === 'claim' ? 'content mid' : 'content top';
      content.append(createText('span', 'label', item.label));

      if (item.title) content.append(createText(item.type === 'cover' ? 'h1' : 'h2', '', item.title));
      if (item.claim) content.append(createText('p', 'claim', item.claim));

      if (item.copy) {
        const copy = document.createElement('div');
        copy.className = 'copy';
        item.copy.forEach((paragraph) => copy.append(createText('p', '', paragraph)));
        content.append(copy);
      }

      if (item.note) content.append(createText('p', 'note', item.note));

      if (item.points) {
        const points = document.createElement('div');
        points.className = 'points';
        item.points.forEach((point, pointIndex) => {
          const row = document.createElement('p');
          row.className = 'point';
          row.append(createText('b', '', String(pointIndex + 1)));
          row.append(createText('span', '', point));
          points.append(row);
        });
        content.append(points);
      }

      article.append(content);

      const foot = document.createElement('div');
      foot.className = 'foot';
      foot.append(createText('span', '', 'AI时代的哲学'));
      foot.append(createText('span', '', item.type === 'cover' ? '卷一' : '语言'));
      article.append(foot);

      section.append(article);
      deck.append(section);
    });

    const progress = document.querySelector('.progress');
    const updateProgress = () => {
      const scrollable = document.documentElement.scrollHeight - window.innerHeight;
      const amount = scrollable > 0 ? window.scrollY / scrollable : 0;
      progress.style.transform = `scaleX(${Math.min(1, Math.max(0, amount))})`;
    };

    updateProgress();
    window.addEventListener('scroll', updateProgress, { passive: true });
  </script>
</body>
</html>
